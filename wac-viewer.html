<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Weekly Ad Check</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A1A24;--bg2:#0E2230;--bg3:#143040;
  --gold:#EDB231;--green:#34C759;--ink:#EAF1F5;--muted:#8BA3B2;--line:#21465C;
}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  background:var(--bg);font-family:'Barlow Condensed',sans-serif;padding:18px 12px 40px;}

.wrap{width:min(460px,96vw);}

/* ---- top brand bar ---- */
.brand{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.brand-logo{width:46px;height:46px;border-radius:12px;background:var(--gold);display:flex;
  align-items:center;justify-content:center;font-weight:800;color:#1a1305;font-size:15px;}
.brand-title{font-size:26px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-0.5px;}
.brand-sub{font-size:12px;color:var(--muted);letter-spacing:2px;margin-top:2px;text-transform:uppercase;}

/* ---- photo ---- */
.photo-card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:18px;}
.photo-card img{width:100%;display:block;}
.photo-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px;letter-spacing:1px;}

/* ---- player (recolored from skyline concept) ---- */
.player{
  position:relative;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);
  border:1px solid var(--line);border-radius:14px;overflow:hidden;
  box-shadow:0 0 50px rgba(237,178,49,0.05),0 20px 50px rgba(0,0,0,0.5);
}
#cityCanvas{display:block;width:100%;height:180px;}
.content-bar{padding:14px 18px 0;}
.city-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.district{font-size:10px;letter-spacing:3px;color:var(--gold);opacity:.7;}
.tuner{display:flex;gap:3px;align-items:flex-end;height:18px;}
.tuner-bar{width:3px;background:rgba(237,178,49,0.25);border-radius:1px;transition:height .15s ease;}
.track-name{font-weight:800;font-size:clamp(22px,5.5vw,32px);color:var(--ink);letter-spacing:-0.5px;line-height:1.05;margin-bottom:3px;}
.track-sub{font-size:12px;color:var(--muted);letter-spacing:2px;margin-bottom:14px;}
.prog-row{margin-bottom:14px;}
.prog-bar{height:4px;background:rgba(237,178,49,0.12);border-radius:3px;cursor:pointer;margin-bottom:6px;position:relative;}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#b8841f,var(--gold));border-radius:3px;position:relative;}
.prog-fill::after{content:'';position:absolute;right:-5px;top:-3px;width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);}
.prog-times{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace;}
.ctrl-row{display:flex;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
.btn-play{flex:1;height:54px;background:transparent;border:none;border-right:1px solid var(--line);
  color:var(--gold);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;
  letter-spacing:4px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;}
.btn-play:hover,.btn-play.active{background:rgba(237,178,49,0.08);}
.btn-stop{width:54px;height:54px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;transition:all .15s;}
.btn-stop:hover{color:var(--gold);background:rgba(237,178,49,0.05);}
.signal-row{padding:12px 0 14px;display:flex;justify-content:space-between;font-size:10px;
  font-family:'Share Tech Mono',monospace;color:var(--muted);letter-spacing:2px;}
.signal-row .on{color:var(--green);}
.footer{text-align:center;margin-top:22px;font-size:12px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
.err{background:rgba(255,69,58,0.1);border:1px solid rgba(255,69,58,0.3);color:#ff9f9f;
  padding:12px;border-radius:10px;font-size:13px;margin-bottom:16px;line-height:1.4;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-logo">WAC</div>
    <div>
      <div class="brand-title">Weekly Ad Check</div>
      <div class="brand-sub" id="brandSub">Audio Walkthrough</div>
    </div>
  </div>

  <div id="errBox"></div>

  <div class="photo-card" id="photoCard">
    <div class="photo-empty" id="photoEmpty">No photo linked</div>
  </div>

  <div class="player">
    <canvas id="cityCanvas"></canvas>
    <div class="content-bar">
      <div class="city-row">
        <span class="district" id="districtLabel">◈ WEEKLY AD CHECK</span>
        <div class="tuner" id="tunerBars"></div>
      </div>
      <div class="track-name" id="trackName">Audio Walkthrough</div>
      <div class="track-sub"><span id="statusMsg">Ready to play</span></div>
      <div class="prog-row">
        <div class="prog-bar" id="progBar"><div class="prog-fill" id="progressFill"></div></div>
        <div class="prog-times"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>
      </div>
      <div class="ctrl-row">
        <button class="btn-play" id="playBtn"><span id="playIcon">▶</span><span id="playLabel">PLAY</span></button>
        <button class="btn-stop" id="stopBtn">■</button>
      </div>
      <div class="signal-row">
        <span>AUDIO: <span class="on">READY</span></span>
        <span id="statusLabel">PAUSED</span>
        <span id="clockEl">--:--:--</span>
      </div>
    </div>
  </div>

  <div class="footer">People · Performance · Progress</div>
</div>

<!-- real audio element -->
<audio id="audio" preload="metadata" crossorigin="anonymous"></audio>

<script>
/* ---------- read image + audio + meta from the URL ----------
   Usage: viewer.html?img=<photoURL>&audio=<mp3URL>&store=Big%20Y%20%237&date=2026-06-26
*/
const params=new URLSearchParams(location.search);
const imgURL=params.get('img');
const audioURL=params.get('audio');
const storeName=params.get('store')||'';
const dateStr=params.get('date')||'';

const $=id=>document.getElementById(id);

// photo
if(imgURL){
  $('photoCard').innerHTML='<img src="'+imgURL.replace(/"/g,'')+'" alt="Weekly Ad Check">';
}
// labels
if(storeName){$('trackName').textContent=storeName;$('districtLabel').textContent='◈ '+storeName.toUpperCase();}
if(dateStr){$('brandSub').textContent=dateStr;}
if(storeName||dateStr){$('statusMsg').textContent='Tap play for the walkthrough';}

// audio
const audio=$('audio');
if(audioURL){audio.src=audioURL.replace(/"/g,'');}
else{$('errBox').innerHTML='<div class="err">No audio link found in this page address.</div>';}

audio.addEventListener('loadedmetadata',()=>{$('totalTime').textContent=fmt(audio.duration);});
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  $('progressFill').style.width=(audio.currentTime/audio.duration*100)+'%';
  $('currentTime').textContent=fmt(audio.currentTime);
});
audio.addEventListener('ended',stopTrack);
audio.addEventListener('error',()=>{
  $('errBox').innerHTML='<div class="err">Couldn\u2019t load the audio. The link may have expired or the file moved.</div>';
});

/* ---------- skyline visualizer (navy/gold) ---------- */
const tb=$('tunerBars');const tuners=[];
for(let i=0;i<5;i++){const d=document.createElement('div');d.className='tuner-bar';d.style.height=(5+i*2)+'px';tb.appendChild(d);tuners.push(d);}

const canvas=$('cityCanvas'),ctx=canvas.getContext('2d');
function resCanvas(){canvas.width=canvas.offsetWidth*devicePixelRatio;canvas.height=canvas.offsetHeight*devicePixelRatio;}
setTimeout(resCanvas,50);addEventListener('resize',resCanvas);

// gold/amber accent palette buildings
const GOLD='#EDB231',GOLD2='#b8841f',CY='#2a6f8f';
const buildings=[
  {x:0,w:0.06,h:0.45,c:'#0c2230',a:GOLD},
  {x:0.04,w:0.08,h:0.7,c:'#0a1c28',a:GOLD2},
  {x:0.1,w:0.07,h:0.55,c:'#0c2230',a:CY},
  {x:0.16,w:0.05,h:0.35,c:'#0a1822',a:GOLD},
  {x:0.19,w:0.09,h:0.8,c:'#0a1c28',a:GOLD},
  {x:0.27,w:0.06,h:0.5,c:'#0c2230',a:CY},
  {x:0.32,w:0.1,h:0.65,c:'#0a1822',a:GOLD2},
  {x:0.4,w:0.07,h:0.42,c:'#0c2230',a:GOLD},
  {x:0.46,w:0.12,h:0.88,c:'#0a1c28',a:GOLD},
  {x:0.57,w:0.07,h:0.52,c:'#0c2230',a:CY},
  {x:0.63,w:0.09,h:0.62,c:'#0a1822',a:GOLD2},
  {x:0.71,w:0.06,h:0.45,c:'#0c2230',a:GOLD},
  {x:0.75,w:0.1,h:0.73,c:'#0a1c28',a:GOLD},
  {x:0.84,w:0.07,h:0.56,c:'#0c2230',a:CY},
  {x:0.9,w:0.1,h:0.44,c:'#0a1822',a:GOLD},
];
// derive windows procedurally
buildings.forEach(b=>{b.windows=[];const cols=3,rows=Math.round(b.h*10);
  for(let r=0;r<rows;r++)for(let cc=0;cc<cols;cc++){if(Math.random()<0.7)b.windows.push([0.22+cc*0.28,0.1+r*(0.8/rows)]);}});

const drops=Array.from({length:90},()=>({x:Math.random(),y:Math.random(),speed:0.008+Math.random()*0.012,len:0.02+Math.random()*0.04}));
let isPlaying=false,animId,idleId;

function drawCity(playing,t){
  const W=canvas.width,H=canvas.height,skyH=H*0.85;ctx.clearRect(0,0,W,H);
  const sky=ctx.createLinearGradient(0,0,0,skyH);
  sky.addColorStop(0,playing?'#0c2438':'#0A1A24');sky.addColorStop(1,playing?'#0e2230':'#0a1620');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,skyH);
  // moon glow
  ctx.beginPath();ctx.arc(W*0.78,H*0.16,playing?18:13,0,Math.PI*2);
  const mg=ctx.createRadialGradient(W*0.78,H*0.16,0,W*0.78,H*0.16,playing?38:24);
  mg.addColorStop(0,`rgba(237,178,49,${playing?0.7:0.35})`);mg.addColorStop(0.4,`rgba(237,178,49,${playing?0.12:0.05})`);mg.addColorStop(1,'transparent');
  ctx.fillStyle=mg;ctx.fill();
  buildings.forEach(b=>{
    const bx=b.x*W,bw=b.w*W,bh=b.h*skyH,by=skyH-bh;
    ctx.fillStyle=b.c;ctx.fillRect(bx,by,bw,bh);
    const ag=ctx.createLinearGradient(bx,0,bx+bw,0);
    ag.addColorStop(0,b.a+'33');ag.addColorStop(0.4,b.a+'0d');ag.addColorStop(1,'transparent');
    ctx.fillStyle=ag;ctx.fillRect(bx,by,bw,bh);
    b.windows.forEach(([wx,wy])=>{
      const winX=bx+wx*bw-2,winY=by+wy*bh-2;
      const on=playing?(Math.sin(t/500+winX+winY)>0):Math.random()<0.4;
      if(on||Math.random()<0.55){
        ctx.fillStyle=on&&playing?b.a+'cc':'rgba(200,220,255,0.12)';
        if(playing&&on){ctx.shadowColor=b.a;ctx.shadowBlur=5;}
        ctx.fillRect(winX,winY,4,4);ctx.shadowBlur=0;
      }
    });
    if(playing){ctx.beginPath();ctx.arc(bx+bw/2,by,2.5,0,Math.PI*2);ctx.fillStyle=b.a;ctx.shadowColor=b.a;ctx.shadowBlur=9;ctx.fill();ctx.shadowBlur=0;}
  });
  const refl=ctx.createLinearGradient(0,skyH,0,H);
  refl.addColorStop(0,playing?'rgba(20,48,64,0.8)':'rgba(10,22,32,0.8)');refl.addColorStop(1,'rgba(10,22,36,0.95)');
  ctx.fillStyle=refl;ctx.fillRect(0,skyH,W,H-skyH);
  if(playing){buildings.forEach(b=>{const bx=b.x*W,bw=b.w*W,refH=Math.min((H-skyH)*0.8,b.h*skyH*0.4);
    const rg=ctx.createLinearGradient(0,skyH,0,skyH+refH);rg.addColorStop(0,b.a+'2a');rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg;ctx.fillRect(bx,skyH,bw,refH);});}
  const ra=playing?0.2:0.07;ctx.strokeStyle=`rgba(180,200,220,${ra})`;ctx.lineWidth=0.5;
  drops.forEach(d=>{d.y+=d.speed*(playing?1.8:0.5);if(d.y>1.1)d.y=-0.1;
    ctx.beginPath();ctx.moveTo(d.x*W,d.y*H);ctx.lineTo(d.x*W+d.len*W*0.05,d.y*H+d.len*H);ctx.stroke();});
}
function idleLoop(){idleId=requestAnimationFrame(idleLoop);drawCity(false,Date.now());updateTuners(false);}
function playLoop(){animId=requestAnimationFrame(playLoop);drawCity(true,Date.now());updateTuners(true);}
function updateTuners(p){tuners.forEach((t,i)=>{t.style.height=p?(5+i*2+Math.abs(Math.sin(Date.now()/200+i))*11)+'px':(5+i*2)+'px';t.style.background=p?'rgba(237,178,49,0.85)':'rgba(237,178,49,0.25)';});}
idleLoop();

setInterval(()=>{const n=new Date();$('clockEl').textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');},1000);

/* ---------- controls wired to REAL audio ---------- */
$('playBtn').onclick=()=>{
  if(!audio.src){$('statusMsg').textContent='No audio file';return;}
  if(audio.paused)audio.play().then(setPlaying).catch(()=>{$('errBox').innerHTML='<div class="err">Tap play again \u2014 the browser blocked autoplay.</div>';});
  else{audio.pause();setPaused();}
};
$('stopBtn').onclick=stopTrack;
$('progBar').onclick=e=>{if(!audio.duration)return;const r=e.currentTarget.getBoundingClientRect();audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;};

function setPlaying(){isPlaying=true;cancelAnimationFrame(idleId);playLoop();
  $('playIcon').textContent='⏸';$('playLabel').textContent='PAUSE';$('statusMsg').textContent='Playing';
  $('statusLabel').textContent='● PLAYING';$('playBtn').classList.add('active');}
function setPaused(){isPlaying=false;cancelAnimationFrame(animId);idleLoop();
  $('playIcon').textContent='▶';$('playLabel').textContent='PLAY';$('statusMsg').textContent='Paused';
  $('statusLabel').textContent='PAUSED';$('playBtn').classList.remove('active');}
function stopTrack(){audio.pause();audio.currentTime=0;setPaused();$('progressFill').style.width='0%';$('currentTime').textContent='0:00';$('statusLabel').textContent='STOPPED';}

function fmt(s){if(!isFinite(s))return'0:00';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
</script>
</body>
</html>
