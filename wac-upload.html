<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>WAC Upload</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A1A24;--bg2:#0E2230;--bg3:#143040;--gold:#EDB231;--green:#34C759;--red:#FF453A;--ink:#EAF1F5;--muted:#8BA3B2;--line:#21465C;}
body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;padding:calc(20px + env(safe-area-inset-top)) 14px 50px;}
.wrap{max-width:540px;margin:0 auto;}
.head{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.logo{width:44px;height:44px;border-radius:11px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;color:#1a1305;font-size:14px;}
h1{font-size:20px;font-weight:700;line-height:1.1;}
.sub{font-size:13px;color:var(--muted);margin:2px 0 22px;}
.field{margin-bottom:16px;}
label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
label .opt{color:var(--line);text-transform:none;letter-spacing:0;font-weight:400;}
input[type=text]{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:12px;font-size:15px;}
input[type=text]:focus{outline:none;border-color:var(--gold);}
.filebtn{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px dashed var(--line);border-radius:12px;padding:16px;cursor:pointer;}
.filebtn .ic{width:38px;height:38px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto;}
.filebtn .lbl{font-size:14px;color:var(--ink);}
.filebtn .lbl small{display:block;color:var(--muted);font-size:12px;margin-top:2px;word-break:break-all;}
.filebtn.has{border-style:solid;border-color:var(--green);}
input[type=file]{display:none;}
.btn{width:100%;border:none;border-radius:11px;font-weight:700;font-size:16px;padding:15px;margin-top:8px;cursor:pointer;}
.btn-gold{background:var(--gold);color:#1a1305;}
.btn-gold:disabled{opacity:.45;}
.btn-ghost{background:var(--bg3);color:var(--ink);border:1px solid var(--line);}
.prog{margin-top:18px;display:none;}
.prog.show{display:block;}
.prog .line{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px;}
.bar{height:6px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:14px;}
.bar > i{display:block;height:100%;width:0%;background:var(--gold);transition:width .2s;}
.out{margin-top:22px;display:none;}
.out.show{display:block;}
.out-label{font-size:12px;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.linkbox{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:12px;word-break:break-all;line-height:1.5;font-family:ui-monospace,monospace;margin-bottom:10px;max-height:140px;overflow:auto;}
.row{display:flex;gap:8px;}
.row .btn{flex:1;margin-top:0;}
.msg{padding:11px;border-radius:9px;font-size:13px;margin-top:14px;line-height:1.4;display:none;}
.msg.show{display:block;}
.msg.err{background:rgba(255,69,58,0.1);border:1px solid rgba(255,69,58,0.3);color:#ff9f9f;}
.cfg{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:12px;color:var(--muted);line-height:1.5;}
.cfg b{color:var(--ink);}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#000;color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .25s;pointer-events:none;}
.toast.show{opacity:.95;}
.divider{height:1px;background:var(--line);margin:20px 0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><div class="logo">WAC</div><div><h1>Friday Upload</h1></div></div>
  <div class="sub">Pick this week's photo and song, tap Upload, get the share link.</div>

  <div class="cfg">
    Viewer page: <b id="cfgview">not set</b> &nbsp;·&nbsp; <span id="setview" style="color:var(--gold);cursor:pointer">change</span>
  </div>

  <div class="field">
    <label>Ad Check Photo</label>
    <label class="filebtn" id="photoBtn" for="photoIn">
      <span class="ic">🖼️</span><span class="lbl" id="photoLbl">Tap to choose photo<small>JPEG from your camera roll</small></span>
    </label>
    <input type="file" id="photoIn" accept="image/*">
  </div>

  <div class="field">
    <label>Sale Song <span class="opt">(mp3 / audio)</span></label>
    <label class="filebtn" id="audioBtn" for="audioIn">
      <span class="ic">🎵</span><span class="lbl" id="audioLbl">Tap to choose audio<small>your weekly song</small></span>
    </label>
    <input type="file" id="audioIn" accept=".mp3,.m4a,.aac,.wav,.ogg,audio/mpeg,audio/mp3,audio/*">
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>Store <span class="opt">(optional)</span></label>
    <input type="text" id="store" placeholder="Big Y #7">
  </div>
  <div class="field">
    <label>Date <span class="opt">(optional)</span></label>
    <input type="text" id="date" placeholder="2026-06-26">
  </div>

  <button class="btn btn-gold" id="go" disabled>Upload &amp; Build Link</button>

  <div class="prog" id="prog">
    <div class="line"><span id="progWhat">Uploading…</span><span id="progPct">0%</span></div>
    <div class="bar"><i id="progFill"></i></div>
  </div>

  <div class="msg err" id="errMsg"></div>

  <div class="out" id="out">
    <div class="out-label">✓ Uploaded — your share link</div>
    <div class="linkbox" id="linkbox"></div>
    <div class="row">
      <button class="btn btn-gold" id="copy">Copy Link</button>
      <button class="btn btn-ghost" id="open">Open Page</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const FN_URL="/.netlify/functions/upload"; // the Netlify Function

// viewer base (where wac-viewer.html lives), saved on device
let viewerBase=localStorage.getItem('wac-viewerbase')||'';
function showCfg(){$('cfgview').textContent=viewerBase||'not set';}
showCfg();
$('setview').onclick=()=>{
  const v=prompt("Full URL to your viewer page (wac-viewer.html):",viewerBase||"https://yoursite.netlify.app/wac-viewer.html");
  if(v){viewerBase=v.trim();localStorage.setItem('wac-viewerbase',viewerBase);showCfg();}
};

// default date = today
$('date').value=new Date().toISOString().slice(0,10);
$('store').value=localStorage.getItem('wac-laststore')||'';

let photoFile=null,audioFile=null;
$('photoIn').onchange=e=>{photoFile=e.target.files[0]||null;mark('photo',photoFile);check();};
$('audioIn').onchange=e=>{audioFile=e.target.files[0]||null;mark('audio',audioFile);check();};
function mark(which,f){
  const btn=$(which+'Btn'),lbl=$(which+'Lbl');
  if(f){btn.classList.add('has');lbl.innerHTML=f.name+'<small>'+(f.size/1048576).toFixed(1)+' MB — ready</small>';}
}
function check(){$('go').disabled=!(photoFile&&audioFile);}

function slug(s){return (s||'').replace(/[^A-Za-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'';}
function ext(name,fallback){const m=/\.([A-Za-z0-9]+)$/.exec(name||'');return m?m[1].toLowerCase():fallback;}

$('go').onclick=async()=>{
  if(!viewerBase){err("Set your viewer page URL first (tap “change” at the top).");return;}
  if(!photoFile||!audioFile){err("Pick both a photo and an audio file.");return;}
  hideErr();$('out').classList.remove('show');$('go').disabled=true;$('prog').classList.add('show');

  const date=$('date').value.trim()||new Date().toISOString().slice(0,10);
  const store=$('store').value.trim();
  if(store)localStorage.setItem('wac-laststore',store);
  const mmdd = date.replace(/-/g,'').slice(4);           // e.g. 0626
  const rand = Math.random().toString(36).slice(2,6);    // 4 random chars
  const slugId = mmdd + '-' + rand;                       // e.g. 0626-k7p2
  const pe = ext(photoFile.name,'jpg');                   // photo extension
  const ae = ext(audioFile.name,'mp3');                   // audio extension
  const photoPath = `${slugId}-photo.${pe}`;
  const audioPath = `${slugId}-song.${ae}`;

  try{
    setProg('Uploading photo…',5);
    const photoPublic=await uploadOne(photoFile,photoPath,(p)=>setProg('Uploading photo…',5+p*0.45));
    setProg('Uploading song…',50);
    const audioPublic=await uploadOne(audioFile,audioPath,(p)=>setProg('Uploading song…',50+p*0.48));
    setProg('Done',100);

    // Build a SHORT link — id + extension hints, plus optional store/date for display:
    const q=new URLSearchParams();
    q.set('id',slugId);
    q.set('pe',pe);
    q.set('ae',ae);
    if(store)q.set('s',store);
    if(date)q.set('d',date);
    const link=viewerBase+(viewerBase.includes('?')?'&':'?')+q.toString();

    $('linkbox').textContent=link;
    $('out').classList.add('show');$('prog').classList.remove('show');
    $('out').scrollIntoView({behavior:'smooth',block:'nearest'});
  }catch(e){
    err(e.message||"Upload failed. Check your connection and try again.");
    $('prog').classList.remove('show');
  }
  $('go').disabled=false;
};

// get a signed URL from our function, then PUT the file straight to Supabase
async function uploadOne(file,path,onProg){
  const r=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})});
  const data=await r.json();
  if(!r.ok)throw new Error(data.error||'Could not get upload URL.');

  await new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('PUT',data.uploadUrl,true);
    xhr.setRequestHeader('Content-Type',file.type||'application/octet-stream');
    xhr.upload.onprogress=ev=>{if(ev.lengthComputable&&onProg)onProg(ev.loaded/ev.total);};
    xhr.onload=()=>{(xhr.status>=200&&xhr.status<300)?resolve():reject(new Error('Storage upload failed ('+xhr.status+').'));};
    xhr.onerror=()=>reject(new Error('Network error during upload.'));
    xhr.send(file);
  });
  return data.publicUrl;
}

function setProg(what,pct){$('progWhat').textContent=what;$('progPct').textContent=Math.round(pct)+'%';$('progFill').style.width=pct+'%';}
function err(m){$('errMsg').textContent=m;$('errMsg').classList.add('show');}
function hideErr(){$('errMsg').classList.remove('show');}

$('copy').onclick=async()=>{
  try{await navigator.clipboard.writeText($('linkbox').textContent);toast("Link copied — paste it in your email.");}
  catch(e){const r=document.createRange();r.selectNodeContents($('linkbox'));const s=getSelection();s.removeAllRanges();s.addRange(r);toast("Selected — long-press to copy.");}
};
$('open').onclick=()=>{const l=$('linkbox').textContent;if(l)window.open(l,'_blank');};
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._);t._=setTimeout(()=>t.classList.remove('show'),2600);}
</script>
</body>
</html>
